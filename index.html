<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sync Survivor</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: #0b0f14;
    color: white;
    overflow: hidden;
}

canvas {
    display: block;
    background: linear-gradient(#0a0f18, #05070c);
}

/* LANDING */
#landing {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle, #101826, #05070c);
    text-align: center;
    z-index: 50;
    padding: 20px;
}

#landing h1 {
    color: #00ff99;
    font-size: 48px;
}

button {
    margin-top: 20px;
    padding: 12px 24px;
    border: none;
    background: #00ff99;
    font-weight: bold;
    cursor: pointer;
}

/* HUD */
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    display: none;
}

/* MOBILE CONTROLS */
#controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 30px;
    z-index: 20;
}

.ctrl {
    font-size: 40px;
    user-select: none;
    opacity: 0.6;
}

/* GAME OVER */
#gameOver {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(0,0,0,0.9);
    z-index: 60;
}

#musicBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 100;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="landing">
    <h1>SYNC SURVIVOR</h1>
    <p>Catch good syncs, avoid failures, survive Friday 4:59 PM chaos.</p>
    <button onclick="startGame()">START</button>
</div>

<div id="hud">
    Score: <span id="score">0</span> | ❤️ <span id="health">3</span>
</div>

<div id="musicBtn" onclick="toggleMusic()">🎵</div>

<div id="gameOver">
    <h1>System Failure</h1>
    <button onclick="restart()">Restart</button>
</div>

<div id="controls">
    <div class="ctrl" ontouchstart="left=true" ontouchend="left=false">⬅️</div>
    <div class="ctrl" ontouchstart="right=true" ontouchend="right=false">➡️</div>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

let started = false;
let items = [];
let particles = [];
let score = 0;
let health = 3;
let boss = false;

let left=false,right=false;

const player = {x:c.width/2,y:c.height-100};

let audioCtx = new AudioContext();
let musicOn = false;
let musicOsc;

function beep(freq,duration,type="sine"){
    let o = audioCtx.createOscillator();
    let g = audioCtx.createGain();
    o.connect(g);
    g.connect(audioCtx.destination);
    o.frequency.value=freq;
    o.type=type;
    o.start();
    g.gain.setValueAtTime(0.2,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+duration);
    o.stop(audioCtx.currentTime+duration);
}

function toggleMusic(){
    musicOn=!musicOn;
    if(musicOn){
        musicOsc=audioCtx.createOscillator();
        let g=audioCtx.createGain();
        musicOsc.connect(g);
        g.connect(audioCtx.destination);
        musicOsc.frequency.value=120;
        musicOsc.type="sawtooth";
        g.gain.value=0.03;
        musicOsc.start();
    }else{
        musicOsc.stop();
    }
}

function startGame(){
    document.getElementById("landing").style.display="none";
    document.getElementById("hud").style.display="block";
    started=true;
    loop();
    spawn();
}

function spawn(){
    if(!started) return;

    let types=[
        {e:"✅",t:"good"},
        {e:"❌",t:"bad"},
        {e:"💾",t:"good"},
        {e:"☕",t:"coffee"}
    ];

    if(score>200 && !boss){
        boss=true;
        types.push({e:"👨‍🏫",t:"boss"});
    }

    let it=types[Math.random()*types.length|0];

    items.push({
        x:Math.random()*c.width,
        y:-20,
        e:it.e,
        t:it.t,
        sp: boss?6:3+Math.random()*3
    });

    setTimeout(spawn, boss?400:700);
}

function explode(x,y,color){
    for(let i=0;i<10;i++){
        particles.push({
            x,y,
            vx:(Math.random()-0.5)*4,
            vy:(Math.random()-0.5)*4,
            life:30,
            color
        });
    }
}

function loop(){
    if(!started) return;

    ctx.clearRect(0,0,c.width,c.height);

    if(left)player.x-=6;
    if(right)player.x+=6;

    ctx.font="40px Arial";
    ctx.fillText("🧑‍💻",player.x,player.y);

    items.forEach((i,idx)=>{
        i.y+=i.sp;
        ctx.fillText(i.e,i.x,i.y);

        if(Math.abs(i.x-player.x)<30 && Math.abs(i.y-player.y)<30){
            if(i.t=="good"){score+=10;beep(600,0.1);explode(i.x,i.y,"green");}
            if(i.t=="bad"){health--;beep(200,0.2,"square");explode(i.x,i.y,"red");}
            if(i.t=="coffee"){beep(900,0.15);explode(i.x,i.y,"yellow");}
            if(i.t=="boss"){health-=2;beep(100,0.5,"sawtooth");}

            items.splice(idx,1);
        }
    });

    particles.forEach((p,i)=>{
        p.x+=p.vx;
        p.y+=p.vy;
        p.life--;
        ctx.fillStyle=p.color;
        ctx.fillRect(p.x,p.y,3,3);
        if(p.life<=0)particles.splice(i,1);
    });

    document.getElementById("score").innerText=score;
    document.getElementById("health").innerText=health;

    if(health<=0){
        document.getElementById("gameOver").style.display="flex";
        started=false;
    }

    requestAnimationFrame(loop);
}

function restart(){location.reload();}
</script>

</body>
</html>
