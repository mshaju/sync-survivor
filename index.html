<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Sync Survivor</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="landing">
    <h1>SYNC SURVIVOR</h1>
    <p>
        Survive the chaos of school IT systems.<br>
        Catch successful syncs, avoid failures, and survive until Friday 5:00 PM.
    </p>

    <button onclick="startGame()">START GAME</button>
</div>

<div id="hud">
    <div>Score: <span id="score">0</span></div>
    <div>Health: <span id="health">❤️❤️❤️</span></div>
    <div id="mode">READY</div>
</div>

<div id="message"></div>

<div id="gameOver">
    <h1>SYSTEM FAILURE</h1>
    <p>Friday 5:00 PM did not arrive safely.</p>
    <button onclick="restartGame()">Restart</button>
</div>

<canvas id="game"></canvas>

<script src="game.js"></script>

</body>
</html>
